<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Perfil</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-perfil">

    <!-- Tarjeta principal estilo arcoíris -->
    <div class="contenedor-formulario">
        <!-- 🌟 CORREGIDO: Frase exacta que coincide con el diccionario para activar el traductor -->
        <h3 class="titulo-tarjeta" data-i18n="titulo-perfil">¡Bienvenido! 👶🌈</h3>
        <p class="subtitulo-perfil" data-i18n="subtitulo-perfil">Carga los datos para personalizar los cuidados de tu peque.</p>

        <form id="form-perfil">
            <div class="grupo-campo">
               <label for="nombre-peque" data-i18n="lbl-nombre-peque">
                  ¿Cómo se llama? 🧸
                </label>
                <input type="text" id="nombre-peque" class="input-arcoiris" placeholder="Ej: Benja, Cati, Sofi" required>
            </div>

            <div class="grupo-campo">
                <label for="edad-peque" data-i18n="lbl-edad-peque">¿Qué edad tiene? 🗓️</label>
                <input type="text" id="edad-peque" class="input-arcoiris" placeholder="Ej: 8 meses, 2 años" required>
            </div>

            <div class="grupo-campo">
                <label for="peso-peque" data-i18n="lbl-peso-peque">¿Cuánto pesa actualmente? (en kg) ⚖️</label>
                <input type="number" id="peso-peque" class="input-arcoiris" step="0.1" min="1" max="50" placeholder="Ej: 12.5" required>
            </div>

            <div class="grupo-campo">
                <label for="altura-peque" data-i18n="lbl-altura-peque">¿Cuánto mide? (en cm) 📏</label>
                <input type="number" id="altura-peque" class="input-arcoiris" min="30" max="150" placeholder="Ej: 85" required>
            </div>

            <button type="submit" class="btn-guardar-todo" data-i18n="btn-crear-perfil">
               ✨ Crear Perfil Arcoíris 🌈
                </button>
        </form>
    </div>

    <!-- Botón para regresar -->
    <button data-i18n="btn-volver" onclick="irA('home.html')">⬅️ Volver al Menú</button>

    <script src="js/app.js"></script>
</body>
</html>
