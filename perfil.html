<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Perfil</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body-perfil">

    <div class="contenedor-formulario">

        <h3 class="titulo-tarjeta">¡Te damos la bienvenida! 👶🌈</h3>

        <p class="subtitulo-perfil">
            Ingresa los datos para personalizar el cuidado de tu peque.
        </p>

        <form id="form-perfil">

            <div class="grupo-campo">

                <label for="nombre-peque">
                    ¿Cómo se llama? 🧸
                </label>

                <input
                    type="text"
                    id="nombre-peque"
                    class="input-arcoiris"
                    placeholder="P. ej., Benja, Cati, Sofi"
                    required>

            </div>

            <div class="grupo-campo">

                <label for="edad-peque">
                    ¿Qué edad tiene? 🗓️
                </label>

                <input
                    type="text"
                    id="edad-peque"
                    class="input-arcoiris"
                    placeholder="P. ej., 8 meses, 2 años"
                    required>

            </div>

            <div class="grupo-campo">

                <label for="peso-peque">
                    ¿Peso actual? (en kg) ⚖️
                </label>

                <input
                    type="number"
                    id="peso-peque"
                    class="input-arcoiris"
                    step="0.1"
                    min="1"
                    max="50"
                    placeholder="P. ej., 12.5"
                    required>

            </div>

            <div class="grupo-campo">

                <label for="altura-peque">
                    ¿Altura actual? (en cm) 📏
                </label>

                <input
                    type="number"
                    id="altura-peque"
                    class="input-arcoiris"
                    min="30"
                    max="150"
                    placeholder="P. ej., 85"
                    required>

            </div>

            <button type="submit" class="btn-guardar-todo">
                ✨ Crear Perfil Arcoíris 🌈
            </button>

        </form>

    </div>

    <button class="btn-volver" onclick="irA('home.html')">
        ⬅️ Volver al menú
    </button>

    <script src="js/app.js"></script>

</body>
</html>
