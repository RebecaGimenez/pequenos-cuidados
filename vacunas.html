<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Vacunas</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-vacunas">

    <!-- Tarjeta principal para registrar vacunas -->
    <div class="contenedor-formulario">
        <!-- 🌟 ID clave para el título -->
        <h3 class="titulo-tarjeta" id="titulo-vacunas-card" data-i18n="titulo-vacunas">¿Qué vacunas aplicamos hoy? 💉</h3>
        
        <form id="form-vacuna">
            <!--Tiene que llamarse exactamente "lista-bloques-vacunas" -->
            <div id="lista-bloques-vacunas"></div>

            <!-- Botones envueltos en la clase arcoíris -->
            <div class="mis-botones-arcoiris">
                <button type="button" onclick="agregarBloqueVacunaHtml()">➕ Agregar Vacuna</button>
                <button type="button" onclick="guardarTodasLasVacunas()">🌟 Guardar Vacunas</button>
              </div>
        </form>
    </div>

    <!-- Contenedor para la lista ordenada de vacunas -->
    <div id="contenedor-lista-vacunas" class="contenedor-lista" style="display: none;">
        <h2>historial de vacunas 📋</h2>
        <div class="tabla-responsiva">
            <table class="tabla-cuidados">
                <thead>
                    <tr>
                        <th>Nombre de la Vacuna</th>
                        <th>Fecha de Colocación</th>
                        <th>Próxima Colocación</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo-vacunas"></tbody>
            </table>
        </div>
    </div>

    <!-- Botón para regresar -->
    <button data-i18n="btn-volver" onclick="irA('home.html')">⬅️ Volver al Menú</button>

    <script src="js/app.js"></script>
</body>
</html>
