<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Vacunas</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body-vacunas">

    <div class="contenedor-formulario">

        <h3 class="titulo-tarjeta" id="titulo-vacunas-card">
            ¿Qué vacunas aplicamos hoy? 💉
        </h3>

        <form id="form-vacuna">

            <div id="lista-bloques-vacunas"></div>

            <div class="mis-botones-arcoiris">

                <button
                    type="button"
                    class="btn-agregar-arcoiris"
                    onclick="agregarBloqueVacunaHtml()">
                    ➕ Agregar Vacuna
                </button>

                <button
                    type="button"
                    class="btn-guardar-todo"
                    onclick="guardarTodasLasVacunas()">
                    🌟 Guardar Vacunas
                </button>

            </div>

        </form>

    </div>

    <div
        id="contenedor-lista-vacunas"
        class="contenedor-lista"
        style="display:none;">

        <h2>
            Historial de vacunas 📋
        </h2>

        <div class="tabla-responsiva">

            <table class="tabla-cuidados">

                <thead>
                    <tr>
                        <th>Nombre de la vacuna</th>
                        <th>Fecha de aplicación</th>
                        <th>Próxima dosis</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tabla-cuerpo-vacunas"></tbody>

            </table>

        </div>

    </div>

    <button
        class="btn-volver"
        onclick="irA('home.html')">
        ⬅️ Volver al menú
    </button>

    <script src="js/app.js"></script>

</body>
</html>
