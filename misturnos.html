<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Turnos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body-turnos">

    <div class="contenedor-formulario">

        <h3 class="titulo-tarjeta" id="titulo-turnos-card">
            ¿Qué turnos o consultas agendamos? 📅
        </h3>

        <form id="form-turno">

            <div id="lista-bloques-turnos"></div>

            <div class="mis-botones-arcoiris">

                <button
                    type="button"
                    class="btn-agregar-arcoiris"
                    onclick="agregarBloqueTurnoHtml()">
                    ➕ Agregar Turno
                </button>

                <button
                    type="button"
                    class="btn-guardar-todo"
                    onclick="guardarTodosLosTurnos()">
                    🌟 Guardar Turnos
                </button>

            </div>

        </form>

    </div>

    <div
        id="contenedor-lista-turnos"
        class="contenedor-lista"
        style="display:none;">

        <h2>
            Turnos programados 📋
        </h2>

        <div class="tabla-responsiva">

            <table class="tabla-cuidados">

                <thead>
                    <tr>
                        <th>Médico / Especialista</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Lugar de consulta</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tabla-cuerpo-turnos"></tbody>

            </table>

        </div>

    </div>

    <button
        class="btn-volver"
        onclick="irA('home.html')">
        ⬅️ Volver al menú
    </button>

    <script src="js/app.js"></script>

</body>
</html>
