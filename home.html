<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Menú</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body-menu">

    <!-- ========================= -->
    <!-- BARRA SUPERIOR -->
    <!-- ========================= -->
    <div class="barra-flotante-superior">

        <!-- Cuidador -->
       <div class="nido-flotante-cuidadores" id="contenedor-cuidador">
            <button
                class="mini-sol-cuidador"
                id="boton-rol-activo"
                onclick="activarEdicionRol()">
                👋Mamá
            </button>

            <input
                type="text"
                id="input-rol-oculto"
                class="input-cuidador-escondido"
                placeholder="¿Quién sos?"
                onblur="guardarRolDesdeInput(this.value)"
                onkeydown="if(event.key==='Enter') guardarRolDesdeInput(this.value)">

            <span class="cartelito-invitacion-rol">
                ¿Con quién hablo hoy? 👀
            </span>
        </div>

        <!-- Agregar peque -->
        <div class="nido-flotante-peques">

            <span class="cartelito-invitacion">
                Agregá a tu peque 🧸
            </span>

            <button
                class="mini-nube-agregar"
                onclick="irA('perfil.html')">
                ➕
            </button>

        </div>

    </div>
    <!-- FIN BARRA SUPERIOR -->


    <!-- Solapas -->
    <div
        id="contenedor-solapas-peques"
        class="lista-solapas-peques">
    </div>


    <!-- Saludo -->
    <p id="frase-aliento" class="mensaje-aliento">
        ✨ ¡Hola! ¿Qué hacemos hoy? 😊
    </p>


    <!-- ========================= -->
    <!-- NUBES -->
    <!-- ========================= -->

    <div class="contenedor-nubes">

        <button
            id="nube-medicacion"
            class="nube"
            onclick="irA('medicaciones.html')">
            Medicación 💊
        </button>

        <button
            id="nube-turnos"
            class="nube"
            onclick="irA('misturnos.html')">
            Turnos 📅
        </button>

        <button
            id="nube-vacunas"
            class="nube"
            onclick="irA('vacunas.html')">
            Vacunas 💉
        </button>

    </div>


    <!-- Política -->
    <div class="bloque-privacidad-menu">
        <a
            href="privacidad.html"
            class="enlace-privacidad-menu">
            🔒 Política de Privacidad
        </a>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
