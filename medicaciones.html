<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Medicación</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body-medicacion">

    <div class="contenedor-formulario">

        <h3 class="titulo-tarjeta">
            Tu tratamiento o medicación 💉
        </h3>

        <!-- Aquí el JS agrega los formularios -->
        <div id="lista-bloques-remedios"></div>

        <div class="mis-botones-arcoiris">

            <button
                type="button"
                class="btn-agregar-arcoiris"
                onclick="agregarBloqueRemedioHtml()">
                ➕ Agregar Medicación
            </button>

            <button
                type="button"
                class="btn-guardar-todo"
                onclick="guardarTodasLasMedicaciones()">
                🌟 Guardar Medicación
            </button>

        </div>

    </div>

    <!-- Lista de medicamentos -->
    <div
        id="contenedor-lista-medicaciones"
        class="contenedor-lista"
        style="display:none;">

        <h2>
            Medicamentos activos 📋
        </h2>

        <div class="tabla-responsiva">

            <table class="tabla-cuidados">

                <thead>

                    <tr>
                        <th>Medicamento</th>
                        <th>Dosis</th>
                        <th>Frecuencia</th>
                        <th>Próxima toma</th>
                        <th>Acción</th>
                    </tr>

                </thead>

                <tbody id="tabla-cuerpo-remedios"></tbody>

            </table>

        </div>

    </div>

    <button
        class="btn-volver"
        onclick="irA('home.html')">
        ⬅️ Volver al menú
    </button>

    <script src="js/app.js"></script>

</body>
</html>
