<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeños Cuidados - Idioma</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-idioma">

    <!-- 🌟 LOGRADO: Forzamos un Gris Cemento Suave que se nota perfectamente en cualquier monitor -->
    <div class="contenedor-formulario contenedor-idioma">
        <h3 class="titulo-tarjeta">✨Elige tu idioma/Choose language🌍</h3>
        
        <div class="bloque-botones-idioma">
            <!-- Botón de Español con su clase única -->
            <button class="btn-idioma borde-es" onclick="seleccionarIdioma('es')">
                <strong>ES</strong> &nbsp; Español
            </button>
            
            <!-- Botón de Inglés con su clase única -->
            <button class="btn-idioma borde-us" onclick="seleccionarIdioma('en')">
                <strong>US</strong> &nbsp; English
            </button>

            <!-- Botón de Portugués con su clase única -->
            <button class="btn-idioma borde-br" onclick="seleccionarIdioma('pt')">
                <strong>BR</strong> &nbsp; Português
            </button>
        </div>
    </div>

<script>console.log("HTML cargando");
  </script>
